# .github/workflows/auto-pr.yml
#
# Automatically creates or updates a PR from `develop` to `main`
# whenever new commits are pushed to `develop`.
#
# This ensures the release path is always one PR-merge away.
# The PR is never auto-merged — a human reviews and merges to main.
#
# IMPORTANT: Always merge this PR using "Rebase and merge" on GitHub.
# This avoids creating merge commits that cause develop and main to diverge.
# The sync-develop.yml workflow will fast-forward develop to main after merge.
#
name: Auto PR develop → main

on:
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open PR from develop → main already exists
          existing=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing" ]; then
            echo "PR #$existing already exists — nothing to do."
          else
            gh pr create \
              --base main \
              --head develop \
              --title "Release: develop → main" \
              --body "Automated PR from \`develop\` to \`main\`.

          This PR is created automatically on every push to \`develop\`.
          Review, verify CI, and **merge using 'Rebase and merge'** to avoid merge commits.
          No sync workflow is needed — develop keeps its original SHAs and works normally.

          ---
          _Created by [auto-pr.yml](/.github/workflows/auto-pr.yml)_"
            echo "PR created."
          fi
