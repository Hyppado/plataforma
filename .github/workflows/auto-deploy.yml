# .github/workflows/auto-deploy.yml
#
# Opens a PR from develop → main after CI passes.
#
# Strategy:
#   1. Triggered on every push to `develop`
#   2. Waits for `ci.yml` to pass on the same SHA
#   3. Creates (or updates) a PR from develop → main
#      Auto-merge is intentionally disabled — merge must be done manually.
#
# Requirements:
#   - Only `GITHUB_TOKEN` — no PAT needed
#   - `ci.yml` must exist and run on `develop` pushes
#
name: Auto Deploy develop → main

on:
  push:
    branches: [develop]

concurrency:
  group: auto-deploy
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  fast-forward-main:
    name: Open PR develop → main
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${GITHUB_SHA}"
          echo "Waiting for CI workflow to complete on ${SHA}..."

          # Find the CI run for this exact SHA
          # Retry loop: CI may not have started yet
          MAX_WAIT=1800  # 30 minutes max
          POLL_INTERVAL=30
          ELAPSED=0

          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --branch develop \
              --json headSha,databaseId,status,conclusion \
              --jq ".[] | select(.headSha == \"${SHA}\") | .databaseId" \
              | head -1)

            if [ -n "$RUN_ID" ]; then
              echo "Found CI run #${RUN_ID} — watching until completion..."
              # gh run watch blocks until the run finishes
              gh run watch "$RUN_ID" \
                --repo "$GITHUB_REPOSITORY" \
                --exit-status \
                && CI_OK=true || CI_OK=false

              if [ "$CI_OK" = true ]; then
                echo "✅ CI passed on ${SHA}"
                break
              else
                echo "❌ CI failed on ${SHA} — aborting deploy."
                exit 1
              fi
            fi

            echo "CI run not found yet. Waiting ${POLL_INTERVAL}s... (${ELAPSED}s elapsed)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
            echo "❌ Timed out waiting for CI run on ${SHA} after ${MAX_WAIT}s."
            exit 1
          fi

      - name: Create or update PR develop → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${GITHUB_SHA}"
          SHORT_SHA="${SHA:0:7}"
          TITLE="chore: deploy develop → main (${SHORT_SHA})"
          BODY="Automated PR opened after CI passed on \`develop\` @ \`${SHA}\`.\n\n⚠️ Auto-merge is disabled. Review and merge manually when ready."

          # Check if an open PR already exists
          EXISTING=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "🔄 Updating existing PR #${EXISTING}..."
            gh pr edit "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$BODY"
            echo "✅ PR #${EXISTING} updated."
          else
            echo "➕ Creating new PR..."
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head develop \
              --title "$TITLE" \
              --body "$BODY"
            echo "✅ PR created."
          fi
