# .github/workflows/sync-develop.yml
#
# After a PR is merged into `main`, fast-forward `develop` to match.
#
# When PRs are merged with "Rebase and merge", the commits on main
# have different SHAs than those on develop. This workflow resets
# develop to point at main so both branches stay aligned.
#
# This avoids the divergence problem where `git push origin develop`
# is rejected because origin/develop has commits that local doesn't.
#
name: Sync develop with main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    name: Fast-forward develop to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update develop to match main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin develop

          # Force-update develop to point at the same commit as main.
          # This is safe because develop→main is a one-way release flow:
          # all commits on main came from develop (via the auto-PR).
          git push origin main:develop --force-with-lease
